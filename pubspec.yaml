name: tina_app
description: Tina - Assistante personnelle de Gérard
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  uuid: ^4.4.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  speech_to_text: ^6.3.0
  flutter_tts: ^3.6.3
  google_fonts: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
