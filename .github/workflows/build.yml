name: Build Tina APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Créer la base Flutter
        run: |
          flutter create /tmp/tina_base --org com.gerard --project-name tina
          cp pubspec.yaml /tmp/tina_base/pubspec.yaml
          rm -rf /tmp/tina_base/lib
          cp -r lib /tmp/tina_base/lib
          cp android/app/src/main/AndroidManifest.xml \
             /tmp/tina_base/android/app/src/main/AndroidManifest.xml
          if [ -d assets ]; then
            mkdir -p /tmp/tina_base/assets
            cp -r assets /tmp/tina_base/
          fi

      - name: Patcher Gradle pour flutter_tts et speech_to_text
        run: |
          ROOT_GRADLE=/tmp/tina_base/android/build.gradle
          APP_GRADLE=/tmp/tina_base/android/app/build.gradle

          # Kotlin 1.9.10 — format ancien (ext.kotlin_version)
          if grep -q "ext.kotlin_version" "$ROOT_GRADLE" 2>/dev/null; then
            sed -i "s/ext.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.10'/" "$ROOT_GRADLE"
          fi
          # Kotlin 1.9.10 — format nouveau (plugins DSL)
          if grep -q "org.jetbrains.kotlin.android" "$ROOT_GRADLE" 2>/dev/null; then
            sed -i 's/org.jetbrains.kotlin.android" version "[^"]*"/org.jetbrains.kotlin.android" version "1.9.10"/' "$ROOT_GRADLE"
          fi

          # S'assurer que compileSdk est 34 et minSdk 21
          if grep -q "compileSdkVersion" "$APP_GRADLE" 2>/dev/null; then
            sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/' "$APP_GRADLE"
          fi
          if grep -q "minSdkVersion [0-9]" "$APP_GRADLE" 2>/dev/null; then
            sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' "$APP_GRADLE"
          fi

          echo "=== android/build.gradle ==="
          cat "$ROOT_GRADLE"
          echo ""
          echo "=== android/app/build.gradle ==="
          cat "$APP_GRADLE"

      - name: Intégrer l'icône Tina
        continue-on-error: true
        run: |
          ICON="${GITHUB_WORKSPACE}/assets/icon.png"
          file "$ICON" || echo "Fichier invalide"
          if [ -f "$ICON" ]; then
            for entry in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
              dir="${entry%%:*}"
              size="${entry##*:}"
              target="/tmp/tina_base/android/app/src/main/res/$dir"
              mkdir -p "$target"
              convert "$ICON" -resize "${size}x${size}" "$target/ic_launcher.png" && \
              convert "$ICON" -resize "${size}x${size}" "$target/ic_launcher_round.png" || \
              echo "Échec resize $size"
            done
            echo "Icônes Tina intégrées"
          fi

      - name: Installer les dépendances
        working-directory: /tmp/tina_base
        run: flutter pub get

      - name: Analyser le code Dart
        working-directory: /tmp/tina_base
        run: flutter analyze || true

      - name: Compiler l'APK
        working-directory: /tmp/tina_base
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tina-app-release
          path: /tmp/tina_base/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
