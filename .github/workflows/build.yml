name: Build Tina APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Créer la base Flutter
        run: |
          flutter create /tmp/tina_base --org com.gerard --project-name tina
          cp pubspec.yaml /tmp/tina_base/pubspec.yaml
          rm -rf /tmp/tina_base/lib
          cp -r lib /tmp/tina_base/lib
          cp android/app/src/main/AndroidManifest.xml \
             /tmp/tina_base/android/app/src/main/AndroidManifest.xml

      - name: Installer les dépendances
        working-directory: /tmp/tina_base
        run: flutter pub get

      - name: Analyser le code Dart
        working-directory: /tmp/tina_base
        run: flutter analyze || true

      - name: Compiler l'APK
        working-directory: /tmp/tina_base
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tina-app-release
          path: /tmp/tina_base/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
